<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Responsive Landing Page</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
background:#111;
color:white;
}

.logo{
font-size:24px;
font-weight:bold;
}

/* NAV */
.nav-link{
color:white;
margin-left:20px;
text-decoration:none;
padding:8px 12px;
border-radius:5px;
transition:0.3s;
}

.nav-link:hover,
.nav-link.active{
background:#007BFF;
}

/* HERO */
.hero{
height:90vh;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1498050108023-c5249f4df085");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:flex-start;
text-align:center;
color:white;
padding-top:120px;
}

.hero-text{
max-width:700px;
}

.hero h1{
font-size:55px;
font-weight:800;
margin-bottom:20px;
background: linear-gradient(90deg, #007BFF, #00C6FF);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

.hero p{
margin-bottom:20px;
}

/* BUTTON */
.hero button{
padding:12px 25px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
transition:0.3s;
}

.hero button:hover{
background:#0056b3;
transform:scale(1.05);
}

/* SECTIONS */
section{
padding:80px 10%;
text-align:center;
}

/* BACKGROUNDS */
#services{
background:linear-gradient(to right, #f8fbff, #eef6ff);
}

#features{
background:#f4f4f4;
}

#contact{
background:linear-gradient(to right, #eef6ff, #dceeff);
}

/* CARDS */
.service-container,
.feature-container{
display:flex;
gap:20px;
margin-top:30px;
}

.card, .feature-card{
flex:1;
padding:25px;
background:white;
border-radius:12px;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card:hover,
.feature-card:hover{
transform:translateY(-10px);
background:#007BFF;
color:white;
}

/* CONTACT FORM */
.contact form{
max-width:350px;
width:100%;
margin:auto;
display:flex;
flex-direction:column;
gap:12px;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* INPUT */
input, textarea{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

/* PASSWORD */
.password-box{
position:relative;
}

#eye{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

/* BUTTON */
button{
padding:10px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

/* SUCCESS */
#successMsg{
display:none;
color:green;
margin-top:10px;
}

/* BACK */
.back-btn{
display:inline-block;
margin-top:20px;
padding:10px 20px;
background:#007BFF;
color:white;
text-decoration:none;
border-radius:5px;
}

/* FOOTER */
footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}

/* RESPONSIVE */
@media(max-width:768px){
.service-container,
.feature-container{
flex-direction:column;
}

.hero h1{
font-size:32px;
}
}

</style>

</head>

<body>

<header>
<div class="logo">Pravee Web Studio</div>
<nav>
<a href="#home" class="nav-link">Home</a>
<a href="#services" class="nav-link">Services</a>
<a href="#features" class="nav-link">Features</a>
<a href="#contact" class="nav-link">Contact</a>
</nav>
</header>


<!-- HERO -->
<section id="home" class="hero">
<div class="hero-text">
<h1>Responsive Landing Page</h1>
<p>Build modern websites easily</p>

<!-- ✅ START BUTTON -->
<button onclick="goToServices()">Get Started</button>

</div>
</section>


<!-- SERVICES -->
<section id="services">
<h2>Our Services</h2>

<div class="service-container">
<div class="card">Web Design</div>
<div class="card">Development</div>
<div class="card">Training</div>
</div>
</section>


<!-- FEATURES -->
<section id="features">
<h2>Features</h2>

<div class="feature-container">
<div class="feature-card">💻 Web Dev</div>
<div class="feature-card">⚡ Fast</div>
<div class="feature-card">🔒 Secure</div>
</div>
</section>


<!-- CONTACT -->
<section id="contact" class="contact">
<h2>Contact Us</h2>

<form id="contactForm">

<input type="email" placeholder="Email" required>

<div class="password-box">
<input type="password" id="password" placeholder="Password" required>
<span id="eye" onclick="togglePassword()">👁️</span>
</div>

<textarea placeholder="Message"></textarea>

<button type="submit">Send Message</button>

</form>

<p id="successMsg">Message sent successfully!</p>

<a href="#home" class="back-btn">⬅ Back to Home</a>

</section>


<footer>
<p>© 2026 Pravee Web Studio</p>
</footer>


<script>

/* SCROLL TO SERVICES */
function goToServices(){
document.getElementById("services").scrollIntoView({
behavior:"smooth"
});
}

/* PASSWORD */
function togglePassword(){
let pass=document.getElementById("password");
pass.type=pass.type==="password"?"text":"password";
}

/* FORM */
document.getElementById("contactForm").addEventListener("submit",function(e){
e.preventDefault();
document.getElementById("successMsg").style.display="block";
this.reset();
});

</script>

</body>
</html>
